version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jombo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-jombo_production}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jombo}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jombo-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - storage_data:/rails/storage
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-jombo}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-jombo_production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jombo-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  storage_data:
  db_data:


networks:
  jombo-network:
    driver: bridge
